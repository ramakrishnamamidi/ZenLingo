name: zenlingo
description: Minimalist local-first Japanese language learning app
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # State
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  # Database
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.0
  path: ^1.9.0
  # Utils
  intl: ^0.20.2
  shared_preferences: ^2.2.0
  flutter_tts: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ">=2.20.0 <3.0.0"
  build_runner: ">=2.4.0 <3.0.0"
  riverpod_generator: ^4.0.3
  riverpod_lint: ^3.1.3
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/data/
    - assets/strokes/hiragana/
    - assets/strokes/katakana/
    - assets/strokes/kanji/n5/
  # fonts added in Phase 2 when NotoSansJP-Regular.ttf is downloaded
